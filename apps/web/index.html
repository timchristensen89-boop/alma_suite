<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#B3262E" />
    <title>ALMA Suites · Compliance</title>
    <link rel="icon" type="image/svg+xml" href="/brand/alma-compliance-logo.svg" />
    <link rel="apple-touch-icon" href="/brand/alma-compliance-logo.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    />
  </head>
  <body>
    <div id="root"></div>
    <script>
      /* Apply the saved theme before first paint to avoid a light flash. */
      try { if (localStorage.getItem('alma.theme') === 'dark') document.documentElement.setAttribute('data-theme', 'dark'); } catch (e) {}
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
